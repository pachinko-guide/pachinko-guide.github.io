<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>広告宣伝ガイドライン 検索データベース｜パチンコ・パチスロ</title>
  <meta name="description" content="パチンコ・パチスロ店営業における広告宣伝ガイドラインのQ&Aと、是正勧告を行った事例を横断検索できるデータベース。">
  <!-- 検索エンジンに載せない（URLを知っている人だけがアクセスできる状態にする） -->
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <nav class="topnav">
        <a href="index.html" class="active">🔍 検索DB</a>
        <a href="check.html">🧪 広告セルフチェック</a>
      </nav>
      <h1>広告宣伝ガイドライン 検索データベース</h1>
      <p class="lead">パチンコ・パチスロ店営業における広告宣伝ガイドラインの <strong>Q&A</strong> と <strong>是正勧告事例</strong> をまとめて検索できます。</p>
    </div>
  </header>

  <main class="wrap">
    <!-- 検索バー -->
    <section class="search-area">
      <div class="search-box">
        <input type="search" id="q" placeholder="キーワードで検索（例: 時差開店、おすすめ、ジャグラー、リニューアル…）" autocomplete="off">
        <button id="clear" type="button" aria-label="クリア">×</button>
      </div>

      <!-- 種別フィルタ -->
      <div class="filter-row">
        <span class="filter-label">種別</span>
        <div class="chips" id="typeChips">
          <button class="chip is-active" data-type="all">すべて</button>
          <button class="chip" data-type="guideline">ガイドライン本文</button>
          <button class="chip" data-type="appendix">別紙（具体例）</button>
          <button class="chip" data-type="qa">Q&A</button>
          <button class="chip" data-type="case">是正勧告事例</button>
        </div>
      </div>

      <!-- 出典フィルタ -->
      <div class="filter-row">
        <span class="filter-label">出典</span>
        <div class="chips" id="sourceChips"></div>
      </div>

      <!-- カテゴリフィルタ -->
      <div class="filter-row">
        <span class="filter-label">分類</span>
        <select id="categorySelect">
          <option value="all">すべての分類</option>
        </select>
      </div>
    </section>

    <p class="result-count" id="count"></p>

    <section id="results" class="results"></section>

    <p class="empty" id="empty" hidden>該当する項目が見つかりませんでした。キーワードやフィルタを変えてお試しください。</p>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>出典：ホール関係4団体（全日遊連／日遊協／MIRAIぱちんこ産業連盟／余暇進）公表資料</p>
      <p class="note">本サイトは上記公表資料を検索用に整理したものです。正式な判断は必ず原典（PDF）をご確認ください。原典は <code>元データ/</code> フォルダに保存されています。</p>
    </div>
  </footer>

  <!-- データ（ファイルを追加するだけで増やせます） -->
  <script src="data/guideline.js"></script>
  <script src="data/appendix.js"></script>
  <script src="data/qa.js"></script>
  <script src="data/cases_05.js"></script>
  <script src="data/cases_06.js"></script>
  <!-- 事例の画像マッピング（元PDFから自動生成） -->
  <script src="data/images.js"></script>
  <!-- アプリ本体 -->
  <script src="assets/app.js"></script>
</body>
</html>
